spring.config.import=optional:file:.env[.properties]
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=America/Bogota
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false
spring.jpa.generate-ddl=true
spring.jpa.hibernate.ddl-auto=update
# Hikari Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000

# Security
api.key=${API_KEY}
jwt.secret=${JWT_SECRET}
# Tiempo de vida del JWT en milisegundos. Por defecto 10 horas (36000000).
# Para producción se recomienda un valor más corto, ej. 8 horas = 28800000
jwt.expiration-ms=${JWT_EXPIRATION_MS:36000000}

# Permitir cargas pesadas (hasta 50MB)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
server.tomcat.max-http-form-post-size=50MB

# Hibernate Batching
spring.jpa.properties.hibernate.jdbc.batch_size=500
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# Producción: Seguridad de Errores y Excepciones
server.error.include-exception=false
server.error.include-stacktrace=never
server.error.include-message=always

# Automatización de Carga de Inventario
app.auto-import.input-path=${RUTA_DESCARGA:app/downloads}
app.auto-import.processed-path=${RUTA_PROCESADOS:app/downloads/procesados}
# IMPORTANTE: Si APP_AUTO_IMPORT_ENABLED no está en el .env, el default es 'true'
app.auto-import.enabled=${APP_AUTO_IMPORT_ENABLED:true}
app.auto-import.delete-after-process=${APP_AUTO_IMPORT_DELETE_AFTER_SUCCESS:false}

# Configuración del SFTP — defaults vacíos para evitar fallo de arranque
# si SFTP no está configurado (enabled=false o entorno de desarrollo)
app.sftp.host=${SFTP_HOST:}
app.sftp.username=${SFTP_USER:}
app.sftp.password=${SFTP_PASSWORD:}
app.sftp.port=${SFTP_PORT:22}
app.sftp.remote-path=${SFTP_REMOTE_PATH:}

# Health Check (Actuator)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
